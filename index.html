<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI 오브젝트 카탈로그 - AI 바이브코딩 실습교육</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #f1f5f9; color: #1f2937; }

    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #1e3a5f, #1e40af);
      color: #fff; padding: 24px 32px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(30,64,175,0.2);
    }
    .header h1 { font-size: 24px; font-weight: 900; }
    .header p { font-size: 14px; color: #94a3b8; margin-top: 4px; }

    /* 검색 & 필터 */
    .controls {
      padding: 16px 32px; background: #fff; border-bottom: 1px solid #e2e8f0;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; position: sticky; top: 60px; z-index: 99;
    }
    .search-box {
      flex: 1; min-width: 200px; padding: 10px 16px; border: 2px solid #e2e8f0;
      border-radius: 999px; font-size: 15px; outline: none;
    }
    .search-box:focus { border-color: #3b82f6; }
    .filter-btn {
      padding: 8px 16px; border: 1px solid #e2e8f0; background: #fff; border-radius: 8px;
      font-size: 14px; font-weight: 700; color: #64748b; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    /* 그리드 */
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; padding: 24px 32px; max-width: 1400px; margin: 0 auto;
    }

    /* 카드 */
    .ui-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .ui-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
    .ui-card-preview {
      background: #f8fafc; padding: 24px; min-height: 120px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid #e2e8f0;
    }
    .ui-card-info { padding: 12px 16px; }
    .ui-card-name { font-size: 16px; font-weight: 700; }
    .ui-card-eng { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .ui-card-cat {
      display: inline-block; margin-top: 6px; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
    }
    .cat-input { background: #dbeafe; color: #2563eb; }
    .cat-display { background: #d1fae5; color: #059669; }
    .cat-nav { background: #ede9fe; color: #7c3aed; }
    .cat-feedback { background: #fef3c7; color: #d97706; }

    /* 모달 */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 20px; max-width: 500px; width: 100%;
      padding: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
    .modal-title { font-size: 24px; font-weight: 900; }
    .modal-eng { font-size: 14px; color: #94a3b8; margin-top: 2px; }
    .modal-close {
      width: 36px; height: 36px; border-radius: 50%; border: none; background: #f1f5f9;
      font-size: 20px; cursor: pointer; color: #64748b; display: grid; place-items: center; flex-shrink: 0;
    }
    .modal-close:hover { background: #e2e8f0; }
    .modal-preview {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 24px; margin: 16px 0; display: flex; align-items: center; justify-content: center; min-height: 80px;
    }
    .modal-section { margin-bottom: 14px; }
    .modal-section-title { font-size: 14px; font-weight: 700; color: #3b82f6; margin-bottom: 4px; }
    .modal-section-text { font-size: 15px; line-height: 1.5; }
    .modal-example {
      background: #1e293b; color: #e2e8f0; padding: 12px 16px; border-radius: 10px;
      font-size: 14px; font-family: 'Courier New', monospace; line-height: 1.5; margin-top: 4px;
    }
    .modal-copy-btn {
      margin-top: 8px; padding: 6px 14px; background: #3b82f6; color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .modal-copy-btn:hover { background: #2563eb; }

    /* === 실제 UI 요소 스타일 === */
    /* 입력 요소 */
    .el-checkbox { display: flex; gap: 8px; align-items: center; font-size: 15px; }
    .el-checkbox input { width: 20px; height: 20px; accent-color: #3b82f6; }
    .el-text-input { width: 100%; padding: 8px 12px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; }
    .el-textarea { width: 100%; padding: 8px 12px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; resize: none; height: 60px; }
    .el-dropdown { width: 100%; padding: 8px 12px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 8px; background: #fff; }
    .el-radio { display: flex; gap: 12px; font-size: 14px; }
    .el-radio label { display: flex; gap: 4px; align-items: center; cursor: pointer; }
    .el-radio input { width: 18px; height: 18px; accent-color: #3b82f6; }
    .el-toggle { position: relative; width: 48px; height: 26px; background: #3b82f6; border-radius: 999px; }
    .el-toggle::after { content:""; position:absolute; width:20px; height:20px; background:#fff; border-radius:50%; top:3px; right:3px; }
    .el-toggle.off { background: #cbd5e1; }
    .el-toggle.off::after { right: auto; left: 3px; }
    .el-slider { width: 100%; height: 6px; -webkit-appearance: none; appearance: none; background: #e2e8f0; border-radius: 999px; outline: none; }
    .el-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #3b82f6; border-radius: 50%; cursor: pointer; }
    .el-search { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f1f5f9; border-radius: 999px; }
    .el-search input { flex: 1; border: none; background: none; outline: none; font-size: 14px; }
    .el-btn { padding: 8px 16px; font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; }
    .el-btn.primary { background: #3b82f6; color: #fff; }
    .el-btn.secondary { background: #e2e8f0; color: #1f2937; }
    .el-btn.danger { background: #f43f5e; color: #fff; }
    .el-date { width: 100%; padding: 8px 12px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 8px; }
    .el-color { display: flex; gap: 6px; align-items: center; }
    .el-color-swatch { width: 32px; height: 32px; border-radius: 8px; border: 2px solid #e2e8f0; }
    .el-color-text { font-size: 14px; font-weight: 700; }
    .el-file-upload { width: 100%; padding: 14px; border: 2px dashed #94a3b8; border-radius: 10px; text-align: center; font-size: 13px; color: #64748b; background: #f8fafc; }
    .el-number { display: flex; align-items: center; }
    .el-num-btn { width: 36px; height: 36px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 18px; font-weight: 700; display: grid; place-items: center; cursor: pointer; }
    .el-num-btn:first-child { border-radius: 8px 0 0 8px; border-right: none; }
    .el-num-btn:last-child { border-radius: 0 8px 8px 0; border-left: none; }
    .el-num-val { width: 50px; height: 36px; border: 2px solid #e2e8f0; display: grid; place-items: center; font-size: 16px; font-weight: 700; }
    .el-password { position: relative; width: 100%; }
    .el-password input { width: 100%; padding: 8px 32px 8px 12px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 8px; }
    .el-password .eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; }
    .el-stepper { display: flex; align-items: center; gap: 4px; }
    .el-step-circle { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; }
    .el-step-circle.done { background: #14b8a6; color: #fff; }
    .el-step-circle.current { background: #3b82f6; color: #fff; }
    .el-step-circle.todo { background: #e2e8f0; color: #94a3b8; }
    .el-step-line { width: 20px; height: 2px; background: #e2e8f0; }
    .el-btn-group { display: flex; border-radius: 8px; overflow: hidden; border: 2px solid #e2e8f0; }
    .el-bg-btn { padding: 6px 14px; font-size: 13px; font-weight: 700; color: #64748b; background: #fff; border-right: 1px solid #e2e8f0; }
    .el-bg-btn:last-child { border-right: none; }
    .el-bg-btn.active { background: #3b82f6; color: #fff; }
    .el-fab { width: 52px; height: 52px; border-radius: 50%; background: #3b82f6; color: #fff; font-size: 24px; display: grid; place-items: center; box-shadow: 0 4px 12px rgba(59,130,246,0.4); cursor: pointer; }
    .el-rating { display: flex; gap: 4px; font-size: 28px; }
    .el-rating .star { color: #f59e0b; }
    .el-rating .star.empty { color: #e2e8f0; }
    .el-otp { display: flex; gap: 6px; }
    .el-otp input { width: 36px; height: 44px; text-align: center; font-size: 20px; font-weight: 700; border: 2px solid #e2e8f0; border-radius: 8px; }
    .el-otp input.filled { border-color: #3b82f6; background: #dbeafe; }
    .el-rte-toolbar { display: flex; gap: 4px; padding: 4px 6px; background: #f1f5f9; border: 2px solid #e2e8f0; border-bottom: none; border-radius: 8px 8px 0 0; }
    .el-rte-btn { padding: 2px 8px; font-size: 12px; font-weight: 700; border: 1px solid #e2e8f0; border-radius: 4px; background: #fff; cursor: pointer; }
    .el-rte-btn.active { background: #dbeafe; color: #2563eb; }
    .el-rte-area { padding: 8px; min-height: 50px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 0 0 8px 8px; }

    /* 표시 요소 */
    .el-list-item { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .el-list-item:last-child { border-bottom: none; }
    .el-list-item .dot { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
    .el-grid-view { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .el-grid-item { aspect-ratio: 1; border-radius: 8px; display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 700; }
    .el-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .el-table th { background: #f1f5f9; padding: 6px 10px; text-align: left; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
    .el-table td { padding: 6px 10px; border-bottom: 1px solid #e2e8f0; }
    .el-card { width: 100%; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .el-card-img { height: 48px; background: linear-gradient(135deg, #3b82f6, #60a5fa); }
    .el-card-body { padding: 8px 10px; }
    .el-card-title { font-size: 14px; font-weight: 700; }
    .el-card-text { font-size: 12px; color: #64748b; margin-top: 2px; }
    .el-tab-headers { display: flex; border-bottom: 2px solid #e2e8f0; }
    .el-tab-header { padding: 6px 14px; font-size: 14px; font-weight: 700; color: #64748b; cursor: pointer; }
    .el-tab-header.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; margin-bottom: -2px; }
    .el-tab-content { padding: 10px; font-size: 14px; }
    .el-modal-demo { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 16px; display: grid; place-items: center; }
    .el-modal-box { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); max-width: 200px; }
    .el-modal-box-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .el-modal-box-text { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .el-modal-box-btn { padding: 4px 12px; font-size: 12px; font-weight: 700; background: #3b82f6; color: #fff; border: none; border-radius: 6px; }
    .el-toast { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; }
    .el-toast.success { background: #10b981; }
    .el-toast.error { background: #f43f5e; }
    .el-toast.info { background: #3b82f6; }
    .el-badge { padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .el-badge.blue { background: #dbeafe; color: #2563eb; }
    .el-badge.green { background: #d1fae5; color: #059669; }
    .el-badge.red { background: #fee2e2; color: #dc2626; }
    .el-pagination { display: flex; gap: 4px; align-items: center; }
    .el-page-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; font-size: 14px; font-weight: 700; display: grid; place-items: center; }
    .el-page-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .el-acc-item { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 4px; overflow: hidden; }
    .el-acc-header { padding: 8px 12px; font-size: 14px; font-weight: 700; background: #f8fafc; display: flex; justify-content: space-between; }
    .el-acc-content { padding: 8px 12px; font-size: 13px; color: #64748b; }
    .el-progress-bar { width: 100%; height: 12px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .el-progress-fill { height: 100%; width: 65%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 999px; }
    .el-tooltip-container { position: relative; display: inline-block; }
    .el-tooltip-target { padding: 6px 14px; background: #3b82f6; color: #fff; border-radius: 8px; font-size: 14px; font-weight: 700; }
    .el-tooltip-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 6px; padding: 6px 10px; background: #1f2937; color: #fff; font-size: 12px; border-radius: 6px; white-space: nowrap; }
    .el-tooltip-bubble::after { content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:#1f2937; }
    .el-sidebar-container { display: flex; width: 100%; border-radius: 8px; overflow: hidden; }
    .el-sidebar { width: 80px; background: #1e293b; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
    .el-sidebar-item { padding: 6px 8px; font-size: 11px; font-weight: 600; color: #94a3b8; border-radius: 6px; }
    .el-sidebar-item.active { background: #3b82f6; color: #fff; }
    .el-sidebar-content { flex: 1; padding: 8px; font-size: 13px; background: #f8fafc; }
    .el-navbar-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: #1e293b; border-radius: 8px 8px 0 0; }
    .el-navbar-logo { font-size: 14px; font-weight: 900; color: #fff; }
    .el-navbar-link { font-size: 12px; font-weight: 600; color: #94a3b8; margin-left: 10px; }
    .el-navbar-link.active { color: #60a5fa; }
    .el-navbar-content { padding: 8px 12px; background: #f8fafc; border-radius: 0 0 8px 8px; font-size: 13px; }
    .el-breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 14px; }
    .el-bc-item { color: #64748b; font-weight: 600; }
    .el-bc-item.last { color: #1f2937; font-weight: 700; }
    .el-bc-sep { color: #cbd5e1; }
    .el-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; display: grid; place-items: center; font-size: 18px; font-weight: 700; }
    .el-avatar-group { display: flex; }
    .el-ag { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #fff; display: grid; place-items: center; font-size: 13px; font-weight: 700; color: #fff; margin-left: -10px; }
    .el-ag:first-child { margin-left: 0; }
    .el-ag:nth-child(1) { background: #3b82f6; }
    .el-ag:nth-child(2) { background: #10b981; }
    .el-ag:nth-child(3) { background: #f59e0b; }
    .el-ag.more { background: #e2e8f0; color: #1f2937; }
    .el-carousel-item { height: 50px; border-radius: 10px; display: grid; place-items: center; font-size: 14px; font-weight: 700; color: #fff; }
    .el-carousel-dots { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
    .el-carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
    .el-carousel-dot.active { background: #3b82f6; }
    .el-timeline { padding-left: 16px; position: relative; }
    .el-timeline::before { content:""; position:absolute; left:5px; top:0; bottom:0; width:2px; background:#e2e8f0; }
    .el-tl-item { position: relative; padding-bottom: 8px; }
    .el-tl-dot { position: absolute; left: -16px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: #3b82f6; border: 2px solid #fff; box-shadow: 0 0 0 2px #3b82f6; }
    .el-tl-title { font-size: 13px; font-weight: 700; }
    .el-tl-date { font-size: 11px; color: #64748b; }
    .el-empty-icon { font-size: 36px; margin-bottom: 4px; }
    .el-empty-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .el-empty-text { font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .el-empty-btn { padding: 4px 12px; font-size: 13px; font-weight: 700; background: #3b82f6; color: #fff; border: none; border-radius: 6px; }
  </style>
</head>
<body>

<div class="header">
  <h1>📖 UI 오브젝트 카탈로그</h1>
  <p>각 요소를 클릭하면 설명, 용도, AI에게 지시할 때의 예시를 볼 수 있습니다. 검색으로 빠르게 찾을 수 있어요.</p>
</div>

<div class="controls">
  <input class="search-box" id="search" type="text" placeholder="🔍 UI 요소 검색 (예: 버튼, 체크박스, 드롭다운)">
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn" data-filter="input">입력 & 액션</button>
  <button class="filter-btn" data-filter="display">표시 & 레이아웃</button>
  <button class="filter-btn" data-filter="nav">네비게이션</button>
  <button class="filter-btn" data-filter="feedback">피드백</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<script>
const uiElements = [
  // === 입력 & 액션 (10) ===
  { id: 1, name: "체크박스", eng: "Checkbox", cat: "input",
    desc: "여러 개를 동시에 선택할 수 있는 버튼입니다. 완료 표시, 다중 선택에 사용합니다.",
    purpose: "할 일 완료 표시, 약관 동의, 다중 항목 선택",
    example: "체크박스를 추가하고 클릭하면 줄을 긋게 해줘.",
    preview: '<div class="el-checkbox"><input type="checkbox" checked> 완료됨</div>'
  },
  { id: 2, name: "텍스트 입력창", eng: "Text Input", cat: "input",
    desc: "한 줄 텍스트를 입력하는 칸입니다. 검색, 이름, 제목 입력에 사용합니다.",
    purpose: "이름 입력, 제목 작성, 검색어 입력, 한 줄 답변",
    example: "텍스트 입력창에 placeholder를 '할 일 입력...'으로 넣어줘.",
    preview: '<input class="el-text-input" type="text" placeholder="할 일 입력..." value="코딩 공부하기">'
  },
  { id: 3, name: "여러 줄 입력창", eng: "Textarea", cat: "input",
    desc: "긴 텍스트를 여러 줄에 걸쳐 입력하는 영역입니다. 메모, 설명, 게시글에 사용합니다.",
    purpose: "메모 작성, 게시글 본문, 상세 설명, 댓글 작성",
    example: "textarea를 4줄 높이로 만들고 placeholder를 넣어줘.",

const grid = document.getElementById('grid');
const modalOverlay = document.getElementById('modal-overlay');
const modal = document.getElementById('modal');
const searchBox = document.getElementById('search');
let currentFilter = 'all';

function renderGrid() {
  const keyword = searchBox.value.toLowerCase().trim();
  const filtered = uiElements.filter(el => {
    const matchFilter = currentFilter === 'all' || el.cat === currentFilter;
    const matchSearch = !keyword || el.name.toLowerCase().includes(keyword) || el.eng.toLowerCase().includes(keyword) || el.desc.toLowerCase().includes(keyword);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;font-size:16px;">🔍 검색 결과가 없습니다.</div>';
    return;
  }

  grid.innerHTML = filtered.map(el => `
    <div class="ui-card" onclick="openModal(${el.id})">
      <div class="ui-card-preview">${el.preview}</div>
      <div class="ui-card-info">
        <div class="ui-card-name">${el.name}</div>
        <div class="ui-card-eng">${el.eng}</div>
        <span class="ui-card-cat cat-${el.cat}">${catLabel(el.cat)}</span>
      </div>
    </div>
  `).join('');
}

function catLabel(cat) {
  const labels = { input: '입력 & 액션', display: '표시 & 레이아웃', nav: '네비게이션', feedback: '피드백' };
  return labels[cat] || cat;
}

function openModal(id) {
  const el = uiElements.find(e => e.id === id);
  if (!el) return;

  modal.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${el.name}</div>
        <div class="modal-eng">${el.eng}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-preview">${el.preview}</div>
    <div class="modal-section">
      <div class="modal-section-title">📖 설명</div>
      <div class="modal-section-text">${el.desc}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">🎯 주요 용도</div>
      <div class="modal-section-text">${el.purpose}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">💬 AI에게 지시할 때</div>
      <div class="modal-example">${el.example}</div>
      <button class="modal-copy-btn" onclick="copyExample('${el.example.replace(/'/g, "\\'")}')">📋 프롬프트 복사</button>
    </div>
  `;

  modalOverlay.classList.add('show');
}

function closeModal(event) {
  if (event && event.target !== modalOverlay) return;
  modalOverlay.classList.remove('show');
}

function copyExample(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy-btn');
    const original = btn.textContent;
    btn.textContent = '✓ 복사됨!';
    btn.style.background = '#10b981';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = '#3b82f6';
    }, 2000);
  });
}

// 검색 이벤트
searchBox.addEventListener('input', renderGrid);

// 필터 이벤트
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

// ESC 키로 모달 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// 초기 렌더링
renderGrid();
</script>
