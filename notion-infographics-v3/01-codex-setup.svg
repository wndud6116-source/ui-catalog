<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <foreignObject width="1600" height="900">
    <div xmlns="http://www.w3.org/1999/xhtml" class="poster">
      <style>
    *{box-sizing:border-box;word-break:keep-all}body{margin:0;background:#f8fafc}
    .poster{width:1600px;height:900px;position:relative;overflow:hidden;padding:58px 76px 46px;font-family:"Malgun Gothic","Segoe UI",Arial,sans-serif;color:#0f172a;background:radial-gradient(circle at 88% 16%,#2563eb26 0 90px,transparent 91px),radial-gradient(circle at 84% 88%,#2563eb18 0 150px,transparent 151px),linear-gradient(135deg,#2563eb18 0%,#f8fafc 38%,#ffffff 100%)}
    .poster:before{content:"";position:absolute;left:-90px;right:-90px;top:170px;height:160px;background:#fff;transform:rotate(-4deg);opacity:.72}
    .top{position:relative;display:grid;grid-template-columns:86px 1fr 330px;gap:24px;align-items:start}
    .no{font-size:62px;font-weight:900;color:#2563eb;line-height:1}
    h1{margin:0;font-size:45px;letter-spacing:0;line-height:1.16;font-weight:900}
    .subtitle{margin-top:14px;font-size:23px;color:#475569;font-weight:600;line-height:1.35}
    .promise{border:2px solid #2563eb55;background:#fff;border-radius:28px;padding:22px 24px;font-size:22px;line-height:1.35;font-weight:900;box-shadow:0 16px 38px #0f172a14}
    .main{position:relative;margin-top:54px;display:grid;grid-template-columns:420px 1fr 390px;grid-template-rows:258px 248px;gap:26px}
    .panel{background:#ffffff;border:1.5px solid #e2e8f0;border-radius:28px;padding:25px;box-shadow:0 16px 36px #0f172a10}
    .scene{grid-row:1/3;padding:26px 26px 155px;background:linear-gradient(180deg,#fff,#2563eb0f);border-color:#2563eb40}
    .scene-title{font-size:25px;font-weight:900;color:#2563eb;margin-bottom:16px}
    .screen{height:312px;background:#f8fafc;border:2px solid #cbd5e1;border-radius:28px;overflow:hidden;box-shadow:inset 0 0 0 1px #fff}
    .dots{height:48px;background:#e2e8f0;display:flex;align-items:center;gap:11px;padding-left:25px}.dots span{width:15px;height:15px;border-radius:50%;background:#ef4444}.dots span:nth-child(2){background:#f59e0b}.dots span:nth-child(3){background:#22c55e}
    .screen-body{padding:24px;position:relative;height:264px}
    .artifact{display:grid;grid-template-columns:1fr 1fr;gap:15px}.artifact i,.route i,.card-deck i{display:block;font-style:normal;background:#fff;border:2px solid #2563eb45;border-radius:18px;padding:16px 12px;text-align:center;font-size:21px;font-weight:900}
    .checkline,.story-line,.exception,.download,.prompt-chip{margin-top:20px;background:#2563eb;color:#fff;border-radius:18px;padding:14px 16px;text-align:center;font-size:20px;font-weight:900}
    .kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi-row b{font-size:25px;color:#2563eb;background:#fff;border:2px solid #2563eb55;border-radius:18px;padding:16px;text-align:center}
    .bars{height:90px;margin:24px 0 10px;display:flex;gap:26px;align-items:end}.bars i{width:46px;background:#2563eb;border-radius:10px 10px 0 0}.table-lines{height:54px;background:repeating-linear-gradient(0deg,#cbd5e1 0 2px,transparent 2px 18px),repeating-linear-gradient(90deg,#cbd5e1 0 2px,transparent 2px 82px)}
    .log{margin:12px 0;padding:13px 15px;border-radius:14px;background:#e2e8f0;font-size:20px;font-weight:800}.log.bad{background:#fee2e2;color:#991b1b}.log.ok{background:#dcfce7;color:#166534}
    .canvas-grid{height:150px;border:2px dashed #94a3b8;border-radius:18px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.canvas-grid b{background:#fff;border:2px solid #2563eb50;border-radius:14px}
    .route{display:flex;gap:10px;flex-wrap:wrap}.route i{width:47%;font-size:17px}.exception{background:#f59e0b}
    .card-deck{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card-deck i{min-height:70px}
    .slide-stack{display:flex;gap:14px}.slide-stack i{width:92px;height:128px;border-radius:12px;background:#fff;border:2px solid #2563eb55;box-shadow:8px 8px 0 #2563eb20}
    .section-title{display:flex;align-items:center;gap:11px;font-size:23px;font-weight:900;margin-bottom:15px}.section-title:before{content:"";width:15px;height:15px;border-radius:50%;background:#2563eb}
    ul{margin:0;padding-left:23px}li{font-size:20px;line-height:1.55;font-weight:700;color:#334155}
    .core{background:linear-gradient(135deg,#fff,#2563eb12);border-color:#2563eb40}.core-list{display:grid;grid-template-columns:1fr 1fr;gap:14px}.core-list b{font-size:24px;text-align:center;background:#fff;border:2px solid #2563eb45;border-radius:18px;padding:17px 12px;color:#2563eb;box-shadow:0 10px 20px #0f172a0c}
    .action{grid-column:2/3}.warning{background:#fff7ed;border-color:#fed7aa}.warning .section-title:before{background:#f97316}.warning p{margin:0;font-size:21px;line-height:1.45;font-weight:800;color:#9a3412}
    .verify{background:#f0fdf4;border-color:#bbf7d0}.verify .section-title:before{background:#16a34a}
    .result{position:absolute;left:0;bottom:0;width:420px;min-height:126px;background:#0f172a;color:#fff;border:0;display:flex;flex-direction:column;justify-content:center;padding:20px 26px}.result .label{font-size:20px;color:#cbd5e1;font-weight:800}.result .value{margin-top:10px;font-size:28px;line-height:1.2;font-weight:900;color:#fff}.result .stamp{display:none}
    .bottom,.foot{display:none}
  </style>
      <div class="top"><div class="no">01</div><div><h1>Codex 설정은 AI와 함께 쓸 작업 책상 만들기</h1><div class="subtitle">폴더, 규칙, 체크리스트, 맥락 노트를 먼저 세팅하면 실습 중 설명이 반복되지 않습니다.</div></div><div class="promise">수업 시작 전 10분 세팅이 이후 모든 실습의 기준이 됩니다.</div></div>
      <div class="main"><div class="panel scene"><div class="scene-title">한눈에 보는 장면</div><div class="screen"><div class="dots"><span></span><span></span><span></span></div><div class="screen-body"><div class="artifact"><i>작업 폴더</i><i>AGENTS.md</i><i>checklist.md</i><i>context-notes.md</i></div><div class="checkline">검증 기준과 결과물까지 기록</div></div></div></div><div class="panel core"><div class="section-title">핵심 개념</div><div class="core-list"><b>작업 폴더</b><b>AGENTS.md</b><b>checklist.md</b><b>context-notes.md</b></div></div><div class="panel warning"><div class="section-title">초보자가 자주 놓치는 부분</div><p>파일을 여기저기 만들면 다음 실습에서 AI가 맥락을 잃습니다.</p></div><div class="panel action"><div class="section-title">수업 중 바로 할 행동</div><ul><li>실습 폴더 열기</li><li>규칙 파일 확인</li><li>할 일 목록 체크</li><li>결정 이유 기록</li></ul></div><div class="panel verify"><div class="section-title">검증 질문</div><ul><li>폴더 구조가 보이는가?</li><li>체크리스트가 갱신되는가?</li><li>메모에 이유가 남는가?</li></ul></div><div class="panel result"><div class="label">최종 산출물</div><div class="value">재사용 가능한 실습 작업공간</div><div class="stamp">DONE</div></div></div>
    </div>
  </foreignObject>
</svg>